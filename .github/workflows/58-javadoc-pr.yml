name: "58-javadoc-pr: Update javadoc for a pr to main"
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/58-javadoc-pr.yml'

jobs:
  call-javadoc-pr:
    uses: ucsb-cs156/workflows/.github/workflows/58-javadoc-pr.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
